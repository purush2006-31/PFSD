<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Submit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px 45px 45px 45px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 2px solid #f57c00;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 25px;
            letter-spacing: -0.3px;
        }

        h1 span {
            font-weight: 400;
            color: #2d4059;
        }

        .info-grid {
            background: #f8f9fc;
            border: 1px solid #e8ecf2;
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 30px;
            margin-bottom: 25px;
        }

        .info-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 15px;
            color: #2d4059;
        }

        .info-item .label {
            font-weight: 500;
            color: #5a6c7e;
        }

        .info-item .value {
            font-weight: 600;
            color: #1a1a2e;
        }

        .info-item .value.tag {
            background: #eef2f7;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .info-item:last-child .value {
            background: #eef2f7;
            padding: 2px 14px;
            border-radius: 20px;
        }

        hr {
            border: none;
            border-top: 1px solid #e8ecf2;
            margin: 20px 0 24px 0;
        }

        .instruction {
            font-size: 17px;
            font-weight: 450;
            color: #1a1a2e;
            padding-bottom: 10px;
            border-bottom: 1px dashed #d0d7e2;
            margin-bottom: 20px;
        }

        .instruction strong {
            font-weight: 600;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
        }

        .input-row label {
            font-size: 15px;
            font-weight: 500;
            color: #2d4059;
            background: #f1f4f9;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
        }

        .input-row input {
            flex: 1 1 200px;
            padding: 10px 18px;
            font-size: 15px;
            border: 1px solid #d5dce6;
            border-radius: 40px;
            outline: none;
            background: white;
            color: #1a1a2e;
            transition: border 0.2s;
            min-width: 160px;
        }

        .input-row input:focus {
            border-color: #f57c00;
            box-shadow: 0 0 0 3px rgba(245, 124, 0, 0.15);
        }

        .input-row input::placeholder {
            color: #94a6bb;
        }

        .btn {
            background: #eef2f7;
            border: 1px solid #d5deea;
            padding: 10px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
            cursor: default;
            transition: background 0.15s;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            background: #e6ebf3;
        }

        .footer-note {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #edf1f7;
            display: flex;
            justify-content: flex-end;
        }

        .footer-note span {
            background: #f1f4f9;
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 450;
            color: #2d4059;
        }

        @media (max-width: 500px) {
            .container {
                padding: 28px 20px 30px;
            }
            h1 {
                font-size: 24px;
            }
            .info-grid {
                gap: 6px 18px;
                padding: 12px 16px;
            }
            .input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .input-row label {
                align-self: flex-start;
            }
            .btn {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Resume <span>Submit</span></h1>

    <div class="info-grid">
        <div class="info-item">
            <span class="label">Type:</span>
            <span class="value tag">Task</span>
        </div>
        <div class="info-item">
            <span class="label">Batch:</span>
            <span class="value">Python-FSD</span>
        </div>
        <div class="info-item">
            <span class="label">Deadline:</span>
            <span class="value">Jun 23, 2026</span>
        </div>
        <div class="info-item">
            <span class="label">Marks:</span>
            <span class="value">10</span>
        </div>
    </div>

    <hr>

    <div class="instruction">
        <strong>Submit your latest resume link</strong>
    </div>

    <div class="input-row">
        <label for="resumeLink">Resume URL</label>
        <input type="url" id="resumeLink" placeholder="https://example.com/resume.pdf">
        <button class="btn" type="button">Submit</button>
    </div>

    <div class="footer-note">
        <span>📎 · PDF or LinkedIn</span>
    </div>

</div>

</body>
</html>
