<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsideBox - Welcome back</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #F8FAFC;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 24px 40px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #1E293B;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            width: 100%;
            max-width: 520px;
            padding: 56px 48px;
        }

        .subtitle {
            color: #94A3B8;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .title {
            color: #1E293B;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            font-size: 15px;
            color: #1E293B;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input::placeholder {
            color: #94A3B8;
        }

        .input-group input:focus {
            border-color: #3B82F6;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1E293B;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input {
            cursor: pointer;
            accent-color: #3B82F6;
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn-primary {
            background-color: #3B82F6;
            color: #FFFFFF;
            border: none;
        }

        .btn-primary:hover {
            background-color: #2563EB;
        }

        .btn-google {
            background-color: #FFFFFF;
            color: #1E293B;
            border: 1px solid #E2E8F0;
        }

        .btn-google:hover {
            background-color: #F8FAFC;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #64748B;
        }

        .footer-text a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">InsideBox</span>
        </div>
    </header>

    <main class="main-container">
        <div class="auth-card">
            <p class="subtitle">Please enter your details</p>
            <h1 class="title">Welcome back</h1>

            <form class="auth-form">
                <div class="input-group">
                    <input type="email" placeholder="Email address" required>
                </div>
                
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="form-actions">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember for 30 days
                    </label>
                    <a href="#" class="forgot-password">Forgot password</a>
                </div>

                <button type="submit" class="btn btn-primary">Sign up</button>
                
                <button type="button" class="btn btn-google">
                    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://w3.org">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>
            </form>

            <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </main>

</body>
</html>
